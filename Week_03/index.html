<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Three.js Cinema Studio - Pro Lighting & Robot</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #000; }
        canvas { display: block; }
        
        #ui-layer {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 100;
        }

        .title-header {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 5px;
            backdrop-filter: blur(5px);
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 2px;
        }

        #preset-ui {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            z-index: 100;
            background: rgba(0,0,0,0.6);
            padding: 15px;
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .preset-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid white;
            background: transparent;
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .preset-btn:hover { background: #e91e63; border-color: #e91e63; }
        
        #status {
            position: absolute;
            top: 80px;
            left: 20px;
            color: #00ff00;
            font-family: monospace;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            pointer-events: none;
            border-left: 3px solid #00ff00;
        }
    </style>
</head>
<body>
    <div id="ui-layer">
        <div class="title-header">Hệ thống Camera Robot & Studio Ánh sáng</div>
    </div>

    <div id="status">HỆ THỐNG: SẴN SÀNG</div>

    <div id="preset-ui">
        <button class="preset-btn" title="Góc chính diện" data-preset="front">F</button>
        <button class="preset-btn" title="Góc từ trên xuống" data-preset="top">T</button>
        <button class="preset-btn" title="Góc thấp" data-preset="low">L</button>
        <button class="preset-btn" title="Góc bao quát" data-preset="orbit">O</button>
    </div>
    <script type="module" src="main.js"></script>
</body>
</html>
